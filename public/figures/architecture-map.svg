<svg width="1600" height="1100" viewBox="0 0 1600 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="1100" fill="#000000"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#00d4aa" stroke-width="0.5">
    <line x1="0" y1="200" x2="1600" y2="200"/><line x1="0" y1="400" x2="1600" y2="400"/>
    <line x1="0" y1="600" x2="1600" y2="600"/><line x1="0" y1="800" x2="1600" y2="800"/>
    <line x1="320" y1="0" x2="320" y2="1100"/><line x1="640" y1="0" x2="640" y2="1100"/>
    <line x1="960" y1="0" x2="960" y2="1100"/><line x1="1280" y1="0" x2="1280" y2="1100"/>
  </g>

  <!-- Title -->
  <text x="80" y="80" fill="#e8e8f0" font-family="system-ui, sans-serif" font-size="40" font-weight="700" letter-spacing="-1">System Architecture</text>
  <text x="80" y="116" fill="#8888a8" font-family="system-ui, sans-serif" font-size="18">How AI Market Cap connects data, intelligence, commerce, and public governance</text>

  <!-- LAYER 1: PRESENTATION -->
  <text x="80" y="188" fill="#00d4aa" font-family="monospace" font-size="12" font-weight="600" letter-spacing="3" opacity="0.7">PRESENTATION LAYER</text>

  <!-- Card: Public Web App -->
  <rect x="80" y="210" width="440" height="160" rx="16" fill="#0a0a0a" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="80" y="210" width="440" height="4" rx="2" fill="#00d4aa"/>
  <circle cx="112" cy="248" r="14" fill="#00d4aa" fill-opacity="0.15" stroke="#00d4aa" stroke-width="1.5"/>
  <text x="108" y="253" fill="#00d4aa" font-family="system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">W</text>
  <text x="140" y="254" fill="#e8e8f0" font-family="system-ui, sans-serif" font-size="20" font-weight="700">Public Web App</text>
  <text fill="#8888a8" font-family="system-ui, sans-serif" font-size="14">
    <tspan x="112" y="290">Model pages, leaderboards, provider views,</tspan>
    <tspan x="112" y="312">search, compare, and discovery workflows</tspan>
  </text>
  <g transform="translate(112, 336)" font-family="monospace" font-size="11">
    <rect width="64" height="22" rx="4" fill="#00d4aa" fill-opacity="0.1"/><text x="8" y="15" fill="#00d4aa">Next.js</text>
    <rect x="72" width="72" height="22" rx="4" fill="#00d4aa" fill-opacity="0.1"/><text x="80" y="15" fill="#00d4aa">React 19</text>
    <rect x="152" width="72" height="22" rx="4" fill="#00d4aa" fill-opacity="0.1"/><text x="160" y="15" fill="#00d4aa">Three.js</text>
  </g>

  <!-- Card: Marketplace -->
  <rect x="580" y="210" width="440" height="160" rx="16" fill="#0a0a0a" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="580" y="210" width="440" height="4" rx="2" fill="#f59e0b"/>
  <circle cx="612" cy="248" r="14" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="608" y="253" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">M</text>
  <text x="640" y="254" fill="#e8e8f0" font-family="system-ui, sans-serif" font-size="20" font-weight="700">Marketplace + Commerce</text>
  <text fill="#8888a8" font-family="system-ui, sans-serif" font-size="14">
    <tspan x="612" y="290">Listings, auctions, manifests, delivery,</tspan>
    <tspan x="612" y="312">settlement, and trust-rail commerce</tspan>
  </text>
  <g transform="translate(612, 336)" font-family="monospace" font-size="11">
    <rect width="56" height="22" rx="4" fill="#f59e0b" fill-opacity="0.1"/><text x="8" y="15" fill="#f59e0b">Stripe</text>
    <rect x="64" width="64" height="22" rx="4" fill="#f59e0b" fill-opacity="0.1"/><text x="72" y="15" fill="#f59e0b">Solana</text>
    <rect x="136" width="48" height="22" rx="4" fill="#f59e0b" fill-opacity="0.1"/><text x="144" y="15" fill="#f59e0b">EVM</text>
  </g>

