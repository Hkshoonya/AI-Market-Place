  <rect x="80" y="748" width="360" height="130" rx="16" fill="#0a0a0a" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="80" y="748" width="360" height="3" rx="1.5" fill="#16c784"/>
  <text x="112" y="788" fill="#e8e8f0" font-family="system-ui, sans-serif" font-size="18" font-weight="700">Supabase</text>
  <text x="207" y="788" fill="#16c784" font-family="system-ui, sans-serif" font-size="14" font-weight="500">Postgres + Auth + RLS</text>
  <text fill="#8888a8" font-family="system-ui, sans-serif" font-size="13"><tspan x="112" y="816">Models, providers, users, listings,</tspan><tspan x="112" y="836">orders, scores — 50+ migrations</tspan></text>
  <text x="112" y="864" fill="#16c784" font-family="monospace" font-size="11" opacity="0.5">supabase/migrations/*</text>

  <rect x="500" y="748" width="360" height="130" rx="16" fill="#0a0a0a" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="500" y="748" width="360" height="3" rx="1.5" fill="#ec4899"/>
  <text x="532" y="788" fill="#e8e8f0" font-family="system-ui, sans-serif" font-size="18" font-weight="700">Data Sources</text>
  <text fill="#8888a8" font-family="system-ui, sans-serif" font-size="13"><tspan x="532" y="816">OpenAI, Anthropic, Google, HuggingFace,</tspan><tspan x="532" y="836">Replicate, CivitAI, OpenRouter, + more</tspan></text>
  <text x="532" y="864" fill="#ec4899" font-family="monospace" font-size="11" opacity="0.5">src/lib/data-sources/*</text>

  <rect x="920" y="748" width="300" height="130" rx="16" fill="#0a0a0a" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="920" y="748" width="300" height="3" rx="1.5" fill="#f59e0b"/>
  <text x="952" y="788" fill="#e8e8f0" font-family="system-ui, sans-serif" font-size="18" font-weight="700">Railway</text>
  <text x="1022" y="788" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="14" font-weight="500">Container Runtime</text>
  <text fill="#8888a8" font-family="system-ui, sans-serif" font-size="13"><tspan x="952" y="816">App hosting, cron scheduler,</tspan><tspan x="952" y="836">custom server, health checks</tspan></text>
  <text x="952" y="864" fill="#f59e0b" font-family="monospace" font-size="11" opacity="0.5">server/ + Dockerfile</text>

  <rect x="1280" y="748" width="240" height="130" rx="16" fill="#0a0a0a" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="1280" y="748" width="240" height="3" rx="1.5" fill="#f5a623"/>
  <text x="1312" y="788" fill="#e8e8f0" font-family="system-ui, sans-serif" font-size="18" font-weight="700">Cloudflare</text>
  <text fill="#8888a8" font-family="system-ui, sans-serif" font-size="13"><tspan x="1312" y="816">CDN, edge caching,</tspan><tspan x="1312" y="836">DDoS protection</tspan></text>

  <!-- LAYER 4: GOVERNANCE -->
  <text x="80" y="934" fill="#00d4aa" font-family="monospace" font-size="12" font-weight="600" letter-spacing="3" opacity="0.7">PUBLIC GOVERNANCE</text>

  <rect x="80" y="952" width="1440" height="72" rx="16" fill="#0a0a0a" stroke="#00d4aa" stroke-width="1" stroke-opacity="0.2"/>
  <g font-family="system-ui, sans-serif" font-size="15" font-weight="600">
    <text x="140" y="994" fill="#00d4aa">CONTRIBUTING</text>
    <text x="282" y="994" fill="#ffffff" fill-opacity="0.08">|</text>
    <text x="310" y="994" fill="#00d4aa">GOVERNANCE</text>
    <text x="428" y="994" fill="#ffffff" fill-opacity="0.08">|</text>
    <text x="456" y="994" fill="#00d4aa">REVENUE</text>
    <text x="546" y="994" fill="#ffffff" fill-opacity="0.08">|</text>
    <text x="574" y="994" fill="#00d4aa">SECURITY</text>
    <text x="672" y="994" fill="#ffffff" fill-opacity="0.08">|</text>
    <text x="700" y="994" fill="#00d4aa">CODE OF CONDUCT</text>
    <text x="872" y="994" fill="#ffffff" fill-opacity="0.08">|</text>
    <text x="900" y="994" fill="#00d4aa">COLLABORATORS</text>
    <text x="1050" y="994" fill="#ffffff" fill-opacity="0.08">|</text>
    <text x="1078" y="994" fill="#8888a8">TRADEMARK</text>
    <text x="1186" y="994" fill="#ffffff" fill-opacity="0.08">|</text>
    <text x="1214" y="994" fill="#8888a8">Apache 2.0</text>
  </g>

  <!-- Footer -->
  <text x="80" y="1072" fill="#8888a8" font-family="system-ui, sans-serif" font-size="13" opacity="0.6">Product first. Public by default. Built to make the AI model economy legible.</text>
  <rect x="1" y="1" width="1598" height="1098" rx="12" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" fill="none"/>
