  <text x="1252" y="526" fill="#e8e8f0" font-family="system-ui, sans-serif" font-size="18" font-weight="700">Agent Systems</text>
  <text fill="#8888a8" font-family="system-ui, sans-serif" font-size="13"><tspan x="1252" y="554">LLM-backed analysis, quality</tspan><tspan x="1252" y="574">monitoring, autonomous ops</tspan></text>
  <text x="1252" y="608" fill="#6366f1" font-family="monospace" font-size="11" opacity="0.5">src/lib/agents + mcp</text>

  <!-- Connectors 2→3 -->
  <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5" stroke-dasharray="6 4">
