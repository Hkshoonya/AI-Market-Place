  <text x="492" y="608" fill="#22d3ee" font-family="monospace" font-size="11" opacity="0.5">src/lib/models + providers</text>

  <rect x="840" y="488" width="340" height="140" rx="16" fill="#0a0a0a" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
