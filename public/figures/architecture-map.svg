  <rect x="1080" y="210" width="440" height="160" rx="16" fill="#0a0a0a" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="1080" y="210" width="440" height="4" rx="2" fill="#ea3943"/>
  <circle cx="1112" cy="248" r="14" fill="#ea3943" fill-opacity="0.15" stroke="#ea3943" stroke-width="1.5"/>
  <text x="1108" y="253" fill="#ea3943" font-family="system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">A</text>
  <text x="1140" y="254" fill="#e8e8f0" font-family="system-ui, sans-serif" font-size="20" font-weight="700">Admin + Operations</text>
  <text fill="#8888a8" font-family="system-ui, sans-serif" font-size="14">
    <tspan x="1112" y="290">Pipeline health, sync controls, moderation,</tspan>
    <tspan x="1112" y="312">operator dashboards, and system status</tspan>
  </text>
  <g transform="translate(1112, 336)" font-family="monospace" font-size="11">
    <rect width="48" height="22" rx="4" fill="#ea3943" fill-opacity="0.1"/><text x="8" y="15" fill="#ea3943">RLS</text>
    <rect x="56" width="48" height="22" rx="4" fill="#ea3943" fill-opacity="0.1"/><text x="64" y="15" fill="#ea3943">Cron</text>
    <rect x="112" width="64" height="22" rx="4" fill="#ea3943" fill-opacity="0.1"/><text x="120" y="15" fill="#ea3943">Sentry</text>
  </g>

  <!-- Connectors 1→2 -->
  <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5" stroke-dasharray="6 4">
    <line x1="300" y1="370" x2="300" y2="430"/><line x1="800" y1="370" x2="800" y2="430"/><line x1="1300" y1="370" x2="1300" y2="430"/>
  </g>
  <g fill="#00d4aa" opacity="0.5"><polygon points="296,428 300,438 304,428"/><polygon points="796,428 800,438 804,428"/><polygon points="1296,428 1300,438 1304,428"/></g>

  <!-- LAYER 2: INTELLIGENCE -->
  <text x="80" y="466" fill="#00d4aa" font-family="monospace" font-size="12" font-weight="600" letter-spacing="3" opacity="0.7">INTELLIGENCE LAYER</text>

  <rect x="80" y="488" width="340" height="140" rx="16" fill="#0a0a0a" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="80" y="488" width="340" height="3" rx="1.5" fill="#00d4aa"/>
  <text x="112" y="526" fill="#e8e8f0" font-family="system-ui, sans-serif" font-size="18" font-weight="700">Scoring Engine</text>
  <text fill="#8888a8" font-family="system-ui, sans-serif" font-size="13"><tspan x="112" y="554">Benchmark normalization, composite</tspan><tspan x="112" y="574">rankings, trust scores, freshness cues</tspan></text>
  <text x="112" y="608" fill="#00d4aa" font-family="monospace" font-size="11" opacity="0.5">src/lib/scoring + compute-scores</text>

  <rect x="460" y="488" width="340" height="140" rx="16" fill="#0a0a0a" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
