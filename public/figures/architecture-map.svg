<svg width="1400" height="760" viewBox="0 0 1400 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="760" rx="28" fill="#071512"/>
  <text x="58" y="84" fill="#F4FFFC" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">Architecture Overview</text>
  <text x="58" y="120" fill="#97D8D0" font-family="Segoe UI, Arial, sans-serif" font-size="20">Public web app, data graph, marketplace, agents, and deployment runtime.</text>
  <rect x="58" y="170" width="260" height="132" rx="24" fill="#0D1F1B" stroke="#39FF14"/>
  <text x="88" y="220" fill="#39FF14" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Public Website</text>
  <text x="88" y="258" fill="#DDF7F2" font-family="Segoe UI, Arial, sans-serif" font-size="18">Next.js pages, APIs, leaderboards, model views, marketplace, commons.</text>
  <rect x="398" y="170" width="260" height="132" rx="24" fill="#0D1F1B" stroke="#00D4AA"/>
  <text x="428" y="220" fill="#00D4AA" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Core Domain</text>
  <text x="428" y="258" fill="#DDF7F2" font-family="Segoe UI, Arial, sans-serif" font-size="18">Scoring, pricing, trust rails, marketplace logic, notification and policy logic.</text>
  <rect x="738" y="170" width="260" height="132" rx="24" fill="#0D1F1B" stroke="#5DE0FF"/>
  <text x="768" y="220" fill="#5DE0FF" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Data Layer</text>
  <text x="768" y="258" fill="#DDF7F2" font-family="Segoe UI, Arial, sans-serif" font-size="18">Supabase Postgres, auth, profiles, listings, orders, revenue records, reports.</text>
  <rect x="1078" y="170" width="260" height="132" rx="24" fill="#0D1F1B" stroke="#39FF14"/>
  <text x="1108" y="220" fill="#39FF14" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Signals</text>
  <text x="1108" y="258" fill="#DDF7F2" font-family="Segoe UI, Arial, sans-serif" font-size="18">Benchmarks, provider news, ranking freshness, model activity, operator checks.</text>
  <rect x="222" y="430" width="300" height="142" rx="24" fill="#0B2225" stroke="#5DE0FF"/>
  <text x="254" y="484" fill="#5DE0FF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Runtime</text>
  <text x="254" y="524" fill="#E9FFFB" font-family="Segoe UI, Arial, sans-serif" font-size="18">Railway app runtime, custom server, in-process cron, health and pipeline flows.</text>
  <rect x="570" y="430" width="300" height="142" rx="24" fill="#0B2225" stroke="#00D4AA"/>
  <text x="602" y="484" fill="#00D4AA" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Community</text>
  <text x="602" y="524" fill="#E9FFFB" font-family="Segoe UI, Arial, sans-serif" font-size="18">Contributors, collaborators, review flow, governance, sponsorship, revenue reports.</text>
  <rect x="918" y="430" width="300" height="142" rx="24" fill="#0B2225" stroke="#39FF14"/>
  <text x="950" y="484" fill="#39FF14" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Distribution</text>
  <text x="950" y="524" fill="#E9FFFB" font-family="Segoe UI, Arial, sans-serif" font-size="18">Cloudflare delivery, public website, repo visibility, issue and PR contribution paths.</text>
  <path d="M318 236H398" stroke="#39FF14" stroke-width="4"/>
  <path d="M658 236H738" stroke="#00D4AA" stroke-width="4"/>
  <path d="M998 236H1078" stroke="#5DE0FF" stroke-width="4"/>
  <path d="M188 302C188 382 372 390 372 430" stroke="#39FF14" stroke-width="3" opacity="0.8"/>
  <path d="M868 302C868 378 720 390 720 430" stroke="#00D4AA" stroke-width="3" opacity="0.8"/>
  <path d="M1208 302C1208 390 1068 390 1068 430" stroke="#5DE0FF" stroke-width="3" opacity="0.8"/>
</svg>
