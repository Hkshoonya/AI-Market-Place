<svg width="1600" height="1180" viewBox="0 0 1600 1180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="1180" rx="32" fill="#000000"/>
  <rect x="28" y="28" width="1544" height="1124" rx="28" fill="#0A0A0A" stroke="#14342D" stroke-width="2"/>

  <text x="72" y="102" fill="#F4FFFC" font-family="Segoe UI, Arial, sans-serif" font-size="50" font-weight="700">
    How AI Market Cap Is Structured
  </text>
  <text x="72" y="150" fill="#93DACA" font-family="Segoe UI, Arial, sans-serif" font-size="24">
    Product surfaces on top of market data, trust systems, operations, and public governance.
  </text>

  <rect x="72" y="220" width="688" height="190" rx="24" fill="#050505" stroke="#00D4AA" stroke-width="2"/>
  <text x="112" y="282" fill="#00D4AA" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Public Product</text>
  <text x="112" y="344" fill="#E8FFF8" font-family="Segoe UI, Arial, sans-serif" font-size="28">
    <tspan x="112" dy="0">Model pages, leaderboards, provider views,</tspan>
    <tspan x="112" dy="40">search, compare, marketplace, commons,</tspan>
    <tspan x="112" dy="40">and admin surfaces for live operations.</tspan>
  </text>

  <rect x="840" y="220" width="688" height="190" rx="24" fill="#050505" stroke="#39FF14" stroke-width="2"/>
  <text x="880" y="282" fill="#39FF14" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Core Intelligence</text>
  <text x="880" y="344" fill="#E8FFF8" font-family="Segoe UI, Arial, sans-serif" font-size="28">
    <tspan x="880" dy="0">Scoring, pricing, trust cues, marketplace policy,</tspan>
    <tspan x="880" dy="40">ranking integrity, notifications, and platform</tspan>
    <tspan x="880" dy="40">logic that turns signals into usable product views.</tspan>
  </text>

  <rect x="72" y="456" width="688" height="190" rx="24" fill="#050505" stroke="#00D4AA" stroke-width="2"/>
  <text x="112" y="518" fill="#00D4AA" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Data And Identity</text>
  <text x="112" y="580" fill="#E8FFF8" font-family="Segoe UI, Arial, sans-serif" font-size="28">
    <tspan x="112" dy="0">Supabase Postgres, auth, profiles, listings,</tspan>
    <tspan x="112" dy="40">orders, reports, and the records that keep the</tspan>
    <tspan x="112" dy="40">public market graph coherent over time.</tspan>
  </text>

  <rect x="840" y="456" width="688" height="190" rx="24" fill="#050505" stroke="#39FF14" stroke-width="2"/>
  <text x="880" y="518" fill="#39FF14" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Market Signals</text>
  <text x="880" y="580" fill="#E8FFF8" font-family="Segoe UI, Arial, sans-serif" font-size="28">
    <tspan x="880" dy="0">Benchmarks, pricing updates, provider changes,</tspan>
    <tspan x="880" dy="40">launch activity, freshness, and integrity checks</tspan>
    <tspan x="880" dy="40">that explain what changed and why it matters.</tspan>
  </text>

  <rect x="72" y="738" width="454" height="242" rx="24" fill="#050505" stroke="#00D4AA" stroke-width="2"/>
  <text x="108" y="804" fill="#00D4AA" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Runtime</text>
  <text x="108" y="868" fill="#E8FFF8" font-family="Segoe UI, Arial, sans-serif" font-size="27">
    <tspan x="108" dy="0">Railway runs the live app,</tspan>
    <tspan x="108" dy="38">while cron and resident</tspan>
    <tspan x="108" dy="38">maintenance keep data and</tspan>
    <tspan x="108" dy="38">operations moving.</tspan>
  </text>

  <rect x="573" y="738" width="454" height="242" rx="24" fill="#050505" stroke="#39FF14" stroke-width="2"/>
  <text x="609" y="804" fill="#39FF14" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Public Governance</text>
  <text x="609" y="868" fill="#E8FFF8" font-family="Segoe UI, Arial, sans-serif" font-size="27">
    <tspan x="609" dy="0">Review rules, contribution</tspan>
    <tspan x="609" dy="38">standards, revenue policy,</tspan>
    <tspan x="609" dy="38">and collaborator roles live</tspan>
    <tspan x="609" dy="38">in the repository itself.</tspan>
  </text>

  <rect x="1074" y="738" width="454" height="242" rx="24" fill="#050505" stroke="#00D4AA" stroke-width="2"/>
  <text x="1110" y="804" fill="#00D4AA" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Distribution</text>
  <text x="1110" y="868" fill="#E8FFF8" font-family="Segoe UI, Arial, sans-serif" font-size="27">
    <tspan x="1110" dy="0">Cloudflare, the public site,</tspan>
    <tspan x="1110" dy="38">GitHub visibility, and open</tspan>
    <tspan x="1110" dy="38">issues and pull requests keep</tspan>
    <tspan x="1110" dy="38">the product inspectable.</tspan>
  </text>

  <path d="M760 315H840" stroke="#00D4AA" stroke-width="4"/>
  <path d="M760 552H840" stroke="#39FF14" stroke-width="4"/>
  <path d="M298 646V738" stroke="#00D4AA" stroke-width="4"/>
  <path d="M800 646V738" stroke="#39FF14" stroke-width="4"/>
  <path d="M1302 646V738" stroke="#00D4AA" stroke-width="4"/>

  <rect x="72" y="1032" width="1456" height="82" rx="20" fill="#050505" stroke="#14342D"/>
  <text x="114" y="1084" fill="#D8FFF4" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="600">
    Product first. Public by default. Built to make the AI model economy easier to understand.
  </text>
</svg>
