      <rect x="758" width="88" height="22" rx="4" fill="#F59E0B" fill-opacity="0.1"/><text x="766" y="15" fill="#FBBF24">Arena ELO</text>
      <rect x="854" width="110" height="22" rx="4" fill="#F59E0B" fill-opacity="0.1"/><text x="862" y="15" fill="#FBBF24">Arena-Hard-Auto</text>
      <rect x="972" width="52" height="22" rx="4" fill="#10B981" fill-opacity="0.1"/><text x="980" y="15" fill="#34D399">MMMU</text>
      <rect x="1032" width="82" height="22" rx="4" fill="#10B981" fill-opacity="0.1"/><text x="1040" y="15" fill="#34D399">MathVista</text>
      <rect x="1122" width="92" height="22" rx="4" fill="#10B981" fill-opacity="0.1"/><text x="1130" y="15" fill="#34D399">LiveBench</text>
      <rect x="1222" width="58" height="22" rx="4" fill="#64748B" fill-opacity="0.1"/><text x="1230" y="15" fill="#94A3B8">+ more</text>
