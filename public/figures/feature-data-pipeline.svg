    <circle cx="88" cy="486" r="12" fill="#F97316" fill-opacity="0.2" stroke="#F97316" stroke-width="1"/>
    <text x="83" y="490" fill="#F97316" font-family="'Inter', sans-serif" font-size="10" font-weight="700">O</text>
    <text x="108" y="490" fill="#E2E8F0" font-family="'Inter', sans-serif" font-size="13" font-weight="600">OpenRouter</text>
