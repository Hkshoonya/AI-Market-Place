  <!-- Footer -->
  <text x="80" y="766" fill="#334155" font-family="'Inter', sans-serif" font-size="13">Tier-based sync, graceful degradation, idempotent writes — adapters that miss a key degrade, they don't crash</text>
  <rect x="1" y="1" width="1598" height="778" rx="12" stroke="#1E293B" stroke-width="1" fill="none"/>
