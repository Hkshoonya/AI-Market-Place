      <text x="16" y="24" fill="#00D4AA" font-family="'Inter', sans-serif" font-size="14" font-weight="700">Market Cap Estimate</text>
      <text x="16" y="48" fill="#94A3B8" font-family="'SF Mono', monospace" font-size="12">$1.2B x (demand/100)^1.2 x (execution/100)^0.4 x (price/100)^0.9 x confidence</text>
      <text x="16" y="64" fill="#475569" font-family="'Inter', sans-serif" font-size="11">Coverage penalties: 1 signal = 50%, 2 = 70%, 3 = 85%, 4+ = 100%</text>
    </g>

