      <text x="16" y="42" fill="#94A3B8" font-family="'Inter', sans-serif" font-size="11">SWE-Bench, HumanEval, Terminal-</text>
      <text x="16" y="56" fill="#94A3B8" font-family="'Inter', sans-serif" font-size="11">Bench, OSWorld, GAIA, WebArena</text>
      <text x="16" y="72" fill="#64748B" font-family="'SF Mono', monospace" font-size="10">8 agent benchmarks</text>

      <!-- Economic -->
      <rect x="252" width="240" height="80" rx="10" fill="#EF4444" fill-opacity="0.05" stroke="#EF4444" stroke-width="1" stroke-opacity="0.3"/>
      <text x="268" y="24" fill="#F87171" font-family="'Inter', sans-serif" font-size="14" font-weight="700">Economic Footprint</text>
      <text x="268" y="42" fill="#94A3B8" font-family="'Inter', sans-serif" font-size="11">Monetization, distribution,</text>
      <text x="268" y="56" fill="#94A3B8" font-family="'Inter', sans-serif" font-size="11">adoption, durability + confidence</text>
      <text x="268" y="72" fill="#64748B" font-family="'SF Mono', monospace" font-size="10">with coverage multipliers</text>
    </g>

    <!-- Market Cap Formula -->
