      <text x="16" y="56" fill="#94A3B8" font-family="'Inter', sans-serif" font-size="11">community signals, category weights</text>
      <text x="16" y="72" fill="#64748B" font-family="'SF Mono', monospace" font-size="10">0-100 normalized</text>

      <!-- Popularity -->
      <rect x="252" width="240" height="80" rx="10" fill="#10B981" fill-opacity="0.05" stroke="#10B981" stroke-width="1" stroke-opacity="0.3"/>
      <text x="268" y="24" fill="#34D399" font-family="'Inter', sans-serif" font-size="14" font-weight="700">Popularity Score</text>
      <text x="268" y="42" fill="#94A3B8" font-family="'Inter', sans-serif" font-size="11">Downloads, likes, stars, news</text>
      <text x="268" y="56" fill="#94A3B8" font-family="'Inter', sans-serif" font-size="11">mentions, trending, durability</text>
      <text x="268" y="72" fill="#64748B" font-family="'SF Mono', monospace" font-size="10">log-normalized 0-100</text>

      <!-- Capability -->
      <rect x="504" width="240" height="80" rx="10" fill="#F59E0B" fill-opacity="0.05" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.3"/>
      <text x="520" y="24" fill="#FBBF24" font-family="'Inter', sans-serif" font-size="14" font-weight="700">Capability Score</text>
      <text x="520" y="42" fill="#94A3B8" font-family="'Inter', sans-serif" font-size="11">Benchmarks (60%), ELO (30%),</text>
      <text x="520" y="56" fill="#94A3B8" font-family="'Inter', sans-serif" font-size="11">release recency (10%)</text>
      <text x="520" y="72" fill="#64748B" font-family="'SF Mono', monospace" font-size="10">weighted composite</text>
    </g>

    <g transform="translate(772, 332)">
