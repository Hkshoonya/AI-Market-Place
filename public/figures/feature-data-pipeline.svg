      <stop offset="0%" stop-color="#020617"/><stop offset="100%" stop-color="#0C1222"/>
    </linearGradient>
    <filter id="cardShadow"><feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
