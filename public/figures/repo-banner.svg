<svg width="1600" height="840" viewBox="0 0 1600 840" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="840" fill="#000000"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#00d4aa" stroke-width="0.5">
    <line x1="0" y1="140" x2="1600" y2="140"/><line x1="0" y1="280" x2="1600" y2="280"/>
    <line x1="0" y1="420" x2="1600" y2="420"/><line x1="0" y1="560" x2="1600" y2="560"/>
    <line x1="0" y1="700" x2="1600" y2="700"/>
    <line x1="200" y1="0" x2="200" y2="840"/><line x1="400" y1="0" x2="400" y2="840"/>
    <line x1="600" y1="0" x2="600" y2="840"/><line x1="800" y1="0" x2="800" y2="840"/>
    <line x1="1000" y1="0" x2="1000" y2="840"/><line x1="1200" y1="0" x2="1200" y2="840"/>
    <line x1="1400" y1="0" x2="1400" y2="840"/>
  </g>

  <!-- Ambient glow circles -->
  <circle cx="1300" cy="200" r="260" fill="#00d4aa" fill-opacity="0.04"/>
  <circle cx="300" cy="650" r="200" fill="#00d4aa" fill-opacity="0.03"/>
  <circle cx="1100" cy="600" r="180" fill="#00d4aa" fill-opacity="0.03"/>

  <!-- Market chart (right side) -->
  <g opacity="0.85">
    <!-- Chart area fill -->
    <path d="M820 580 L880 520 L940 540 L1000 470 L1060 490 L1120 420 L1180 380 L1240 350 L1300 310 L1360 280 L1420 240 L1480 200 L1540 180 L1540 580 Z" fill="#00d4aa" fill-opacity="0.06"/>
    <!-- Main line -->
    <path d="M820 580 L880 520 L940 540 L1000 470 L1060 490 L1120 420 L1180 380 L1240 350 L1300 310 L1360 280 L1420 240 L1480 200 L1540 180" stroke="#00d4aa" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Secondary line -->
    <path d="M820 600 L880 570 L940 580 L1000 540 L1060 550 L1120 510 L1180 480 L1240 460 L1300 430 L1360 410 L1420 370 L1480 340 L1540 310" stroke="#00d4aa" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
    <!-- Data points -->
    <g fill="#00d4aa">
      <circle cx="1000" cy="470" r="5"/><circle cx="1120" cy="420" r="5"/>
      <circle cx="1240" cy="350" r="5"/><circle cx="1360" cy="280" r="5"/>
      <circle cx="1480" cy="200" r="6"/><circle cx="1540" cy="180" r="4"/>
    </g>
    <!-- Labels -->
    <g font-family="monospace" font-size="11" fill="#00d4aa" opacity="0.6">
      <text x="1470" y="190">GPT-5</text>
      <text x="1350" y="270">Claude 4</text>
      <text x="1230" y="340">Gemini 2</text>
      <text x="1110" y="410">Llama 4</text>
    </g>
    <!-- Axis -->
    <line x1="820" y1="580" x2="1540" y2="580" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <g font-family="monospace" font-size="10" fill="#8888a8" opacity="0.5">
      <text x="820" y="596">Jan</text><text x="1000" y="596">Apr</text>
      <text x="1180" y="596">Jul</text><text x="1360" y="596">Oct</text>
      <text x="1500" y="596">Now</text>
    </g>
  </g>

  <!-- Floating nodes -->
  <g opacity="0.2">
    <circle cx="900" cy="180" r="3" fill="#00d4aa"/><circle cx="950" cy="220" r="2" fill="#00d4aa"/>
    <circle cx="1050" cy="160" r="2.5" fill="#00d4aa"/><circle cx="1150" cy="200" r="2" fill="#00d4aa"/>
    <circle cx="870" cy="300" r="2" fill="#00d4aa"/><circle cx="980" cy="280" r="3" fill="#00d4aa"/>
    <line x1="900" y1="180" x2="950" y2="220" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="950" y1="220" x2="1050" y2="160" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="1050" y1="160" x2="1150" y2="200" stroke="#00d4aa" stroke-width="0.5"/>
  </g>

  <!-- Accent line -->
  <rect x="80" y="395" width="680" height="2" fill="#00d4aa" opacity="0.6" rx="1"/>

  <!-- Title -->
  <text x="80" y="310" fill="#e8e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="82" font-weight="800" letter-spacing="-2">
    AI Market Cap
  </text>

  <!-- Subtitle -->
  <text x="80" y="370" fill="#00d4aa" font-family="system-ui, sans-serif" font-size="32" font-weight="500" letter-spacing="0.5">
    The Public Market Graph for AI Models
  </text>

  <!-- Description -->
  <text fill="#8888a8" font-family="system-ui, sans-serif" font-size="20" font-weight="400">
    <tspan x="80" dy="456">Track rankings, benchmarks, pricing, launches, provider</tspan>
    <tspan x="80" dy="30">momentum, and agent-native commerce — all in one place.</tspan>
  </text>

  <!-- CTA badges -->
  <g transform="translate(80, 540)">
    <rect width="180" height="48" rx="24" fill="#0a0a0a" stroke="#00d4aa" stroke-width="1.5"/>
    <circle cx="24" cy="24" r="5" fill="#00d4aa"/>
    <text x="42" y="30" fill="#00d4aa" font-family="system-ui, sans-serif" font-size="16" font-weight="600">aimarketcap.tech</text>

    <rect x="200" y="0" width="160" height="48" rx="24" fill="#0a0a0a" stroke="#00d4aa" stroke-width="1" stroke-opacity="0.3"/>
    <text x="232" y="30" fill="#00d4aa" font-family="system-ui, sans-serif" font-size="16" font-weight="600">Open Source</text>

    <rect x="380" y="0" width="160" height="48" rx="24" fill="#0a0a0a" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>
    <text x="410" y="30" fill="#8888a8" font-family="system-ui, sans-serif" font-size="16" font-weight="500">Apache 2.0</text>
  </g>

  <!-- Tech stack -->
  <g transform="translate(80, 628)" font-family="monospace" font-size="13" fill="#8888a8">
    <text>Next.js</text>
    <text x="72" fill="#ffffff" fill-opacity="0.08">|</text>
    <text x="88">React 19</text>
    <text x="164" fill="#ffffff" fill-opacity="0.08">|</text>
    <text x="180">Supabase</text>
    <text x="260" fill="#ffffff" fill-opacity="0.08">|</text>
    <text x="276">TypeScript</text>
    <text x="368" fill="#ffffff" fill-opacity="0.08">|</text>
    <text x="384">Three.js</text>
    <text x="456" fill="#ffffff" fill-opacity="0.08">|</text>
    <text x="472">Solana</text>
  </g>

  <!-- Bottom tagline -->
  <text x="80" y="760" fill="#8888a8" font-family="system-ui, sans-serif" font-size="14" font-weight="400" letter-spacing="3" opacity="0.6">
    RANKINGS  ·  BENCHMARKS  ·  PRICING  ·  LAUNCHES  ·  MARKETPLACE  ·  GOVERNANCE
  </text>

  <!-- Border -->
  <rect x="1" y="1" width="1598" height="838" rx="12" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" fill="none"/>
</svg>