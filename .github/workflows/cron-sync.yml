name: Manual Cron Recovery

# Railway in-process cron is the production scheduler of record.
# This workflow is kept only for manual recovery runs.
# Endpoint failures are recorded by the app in cron_runs/admin surfaces; this
# workflow avoids failing on those responses so GitHub does not spam failure emails.

on:
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run"
        required: true
        type: choice
        options:
          - all
          - sync-tier-1
          - sync-tier-2
          - sync-tier-3
          - sync-tier-4
          - compute-scores
          - social-publish
          - marketplace-policy
          - agents-pipeline
          - agents-verifier
          - agents-code-quality
          - agents-ux-monitor

env:
  SITE_URL: ${{ secrets.SITE_URL }}
  CRON_SECRET: ${{ secrets.CRON_SECRET }}

jobs:
  sync-tier-1:
    if: github.event.inputs.job == 'sync-tier-1' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Tier 1 Sync
        run: |
          response=$(curl -s -o /tmp/cron-response.txt -w "%{http_code}" \
            -X GET "$SITE_URL/api/cron/sync?tier=1" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 300 || true)
          echo "Response: ${response:-transport-error}"
          if [ -z "${response:-}" ]; then
            echo "::warning::Tier 1 trigger failed at transport level. Inspect app health/admin cron panel."
          elif [ "$response" -ge 400 ]; then
            echo "::warning::Tier 1 endpoint returned HTTP $response. Inspect admin cron panel."
          fi

  sync-tier-2:
    if: github.event.inputs.job == 'sync-tier-2' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 10
