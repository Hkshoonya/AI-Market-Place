name: Data Sync Crons

# Backup layer — staggered from node-cron primary to fill gaps.
# Together they double the effective sync frequency.

on:
  schedule:
    # Tier 1: Every 2h at odd hours (node-cron covers even hours)
    - cron: '0 1-23/2 * * *'
    # Tier 2: Every 4h offset by 2 (node-cron 0,4,8,12,16,20 — GH 2,6,10,14,18,22)
    - cron: '0 2-22/4 * * *'
    # Tier 3: Every 6h offset by 3 (node-cron 0,6,12,18 — GH 3,9,15,21)
    - cron: '0 3-21/6 * * *'
    # Tier 4: Daily at noon (node-cron at midnight)
    - cron: '0 12 * * *'
    # Compute scores: Every 2h at odd hours :45 (node-cron even :45)
    - cron: '45 1-23/2 * * *'
    # Agent pipeline: Every 4h offset by 2 at :30
    - cron: '30 2-22/4 * * *'
    # Code quality: Daily 21:00 (node-cron 09:00)
    - cron: '0 21 * * *'
    # UX monitor: Thursday 22:00 (node-cron Mon 10:00)
    - cron: '0 22 * * 4'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        type: choice
        options:
          - all
          - sync-tier-1
          - sync-tier-2
          - sync-tier-3
          - sync-tier-4
          - compute-scores
          - agents-pipeline
          - agents-code-quality
          - agents-ux-monitor

env:
  SITE_URL: ${{ secrets.SITE_URL }}
  CRON_SECRET: ${{ secrets.CRON_SECRET }}

jobs:
  sync-tier-1:
    if: github.event.schedule == '0 1-23/2 * * *' || github.event.inputs.job == 'sync-tier-1' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Tier 1 Sync
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "$SITE_URL/api/cron/sync?tier=1" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 300)
          echo "Response: $response"
          if [ "$response" -ge 400 ]; then exit 1; fi

  sync-tier-2:
    if: github.event.schedule == '0 2-22/4 * * *' || github.event.inputs.job == 'sync-tier-2' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Tier 2 Sync
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "$SITE_URL/api/cron/sync?tier=2" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 300)
          echo "Response: $response"
          if [ "$response" -ge 400 ]; then exit 1; fi

  sync-tier-3:
    if: github.event.schedule == '0 3-21/6 * * *' || github.event.inputs.job == 'sync-tier-3' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Tier 3 Sync
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "$SITE_URL/api/cron/sync?tier=3" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 300)
          echo "Response: $response"
          if [ "$response" -ge 400 ]; then exit 1; fi

  sync-tier-4:
    if: github.event.schedule == '0 12 * * *' || github.event.inputs.job == 'sync-tier-4' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Tier 4 Sync
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "$SITE_URL/api/cron/sync?tier=4" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 300)
          echo "Response: $response"
          if [ "$response" -ge 400 ]; then exit 1; fi

  compute-scores:
    if: github.event.schedule == '45 1-23/2 * * *' || github.event.inputs.job == 'compute-scores' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Compute Scores
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "$SITE_URL/api/cron/compute-scores" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 300)
          echo "Response: $response"
          if [ "$response" -ge 400 ]; then exit 1; fi

  agents-pipeline:
    if: github.event.schedule == '30 2-22/4 * * *' || github.event.inputs.job == 'agents-pipeline' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Agent Pipeline
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "$SITE_URL/api/cron/agents/pipeline" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 300)
          echo "Response: $response"
          if [ "$response" -ge 400 ]; then exit 1; fi

  agents-code-quality:
    if: github.event.schedule == '0 21 * * *' || github.event.inputs.job == 'agents-code-quality' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Code Quality Agent
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "$SITE_URL/api/cron/agents/code-quality" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 300)
          echo "Response: $response"
          if [ "$response" -ge 400 ]; then exit 1; fi

  agents-ux-monitor:
    if: github.event.schedule == '0 22 * * 4' || github.event.inputs.job == 'agents-ux-monitor' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger UX Monitor Agent
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "$SITE_URL/api/cron/agents/ux-monitor" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 300)
          echo "Response: $response"
          if [ "$response" -ge 400 ]; then exit 1; fi
