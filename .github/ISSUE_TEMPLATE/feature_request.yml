name: Feature request
description: Propose a product, data, or community improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: user_value
    attributes:
      label: Why this matters
      description: Explain the user, contributor, or product value.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Public website
        - Rankings / model data
        - Marketplace
        - Social commons
        - Admin / operators
        - Governance / community
        - Documentation / repo experience
    validations:
      required: true
